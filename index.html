        async function initGoogleSheetsDB() {
            if (!window.GOOGLE_SHEETS_API_URL) {
                console.warn("https://script.google.com/macros/s/AKfycbw8RDAIMtmB23voJqvdfTqNXFjqwGPsPpd1KyL6u8_VE7ykuO8XpMkuh1Y_UnzN6tU/exec");
                if(!window.appInitialized) { window.appInitialized = true; window.initApp(); }
                return;
            }
            try {
                // 從 Google Sheets 獲取資料
                const response = await fetch(window.GOOGLE_SHEETS_API_URL);
                const result = await response.json();
                
                if (result.status === "success" && result.data) {
                    // 若試算表內有資料，解析並覆蓋本地預設資料
                    const dbData = JSON.parse(result.data);
                    if (dbData.teamMembersData) window.teamMembersData = dbData.teamMembersData;
                    if (dbData.otherTasksData) window.otherTasksData = dbData.otherTasksData;
                    if (dbData.sixMajorTasksData) window.sixMajorTasksData = dbData.sixMajorTasksData;
                    console.log("成功從 Google Sheets 載入資料");
                }
            } catch (e) {
                console.error("讀取 Google Sheets 失敗，使用預設資料:", e);
            } finally {
                if(!window.appInitialized) { window.appInitialized = true; window.initApp(); }
            }
        }

        window.syncDataToGoogleSheets = async function() {
            if (!window.GOOGLE_SHEETS_API_URL) return;
            
            const payload = {
                teamMembersData: window.teamMembersData,
                otherTasksData: window.otherTasksData,
                sixMajorTasksData: window.sixMajorTasksData
            };

            try {
                const indicator = document.getElementById('sync-indicator');
                if (indicator) {
                    indicator.classList.remove('opacity-0');
                    indicator.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>同步中...';
                }

                // 使用 POST 傳送資料，設定 Content-Type 為 text/plain 以避免 CORS preflight 問題
                await fetch(window.GOOGLE_SHEETS_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify(payload)
                });
                
                if (indicator) {
                    indicator.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-1 text-emerald-400"></i>已同步至 Google Sheets';
                    setTimeout(() => indicator.classList.add('opacity-0'), 2000);
                }
            } catch(e) { 
                console.error("同步至 Google Sheets 錯誤:", e); 
                const indicator = document.getElementById('sync-indicator');
                if (indicator) {
                    indicator.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1 text-red-500"></i>同步失敗';
                }
            }
        };

        // ==========================================
        // 4. 視圖渲染輔助工具與核心功能
        // ==========================================
        window.calculateMajorTaskProgress = function(task) {
            if (!task.kpi || task.kpi.length === 0) return 0;
            let total = 0, count = 0;
            task.kpi.forEach(k => {
                if (!k.isOngoing) {
                    let p = k.target > 0 ? (k.current / k.target) * 100 : 0;
                    total += Math.min(p, 100); 
                    count++;
                }
            });
            if (count === 0) return '持續進行';
            return Math.round(total / count);
        }

        window.toggleAccordion = function(index) {
            const content = document.getElementById('content-' + index), icon = document.getElementById('icon-' + index);
            var isExpanded = content.classList.contains('expanded');
            if (isExpanded) {
                content.classList.remove('expanded');
                icon.classList.remove('rotate-180');
            } else {
                content.classList.add('expanded');
                icon.classList.add('rotate-180');
            }
            window.accordionStates[index] = !isExpanded;
        }

            let colorClass = '';
            switch(status) {
                case '進行中': colorClass = 'bg-blue-100 text-blue-700 border-blue-200'; break;
                case '已結案': colorClass = 'bg-emerald-100 text-emerald-700 border-emerald-200'; break;
                case '規劃中': colorClass = 'bg-amber-100 text-amber-700 border-amber-200'; break;
                default: colorClass = 'bg-gray-100 text-gray-700 border-gray-200';
            }
            return `<span class="px-3 py-1 rounded-full text-xs font-medium border shadow-sm ${colorClass}">${status}</span>`;
        }

        window.getToday = function() {
            return new Date().toISOString().split('T')[0];
        }

        window.reorderTasksByDOM = function(tbodyElement, filterFn) {
            const rows = tbodyElement.querySelectorAll('tr[data-task-id]');
            const newIdOrder = Array.from(rows).map(r => r.getAttribute('data-task-id'));
            const matchingTasks = window.otherTasksData.filter(filterFn);
            matchingTasks.sort((a, b) => newIdOrder.indexOf(a.id) - newIdOrder.indexOf(b.id));
            let matchingIdx = 0;
            window.otherTasksData = window.otherTasksData.map(t => {
                if (filterFn(t)) return matchingTasks[matchingIdx++];
                return t;
            });
            window.syncDataToGoogleSheets(); // 更新順序至雲端
        }

            container.innerHTML = `<div class="mb-6 bg-white p-6 rounded-xl border shadow-sm"><div class="flex justify-between items-center mb-4"><div class="flex items-center gap-3"><h3 class="text-lg font-bold text-emerald-800"><i class="fa-solid fa-box-archive mr-2"></i>已結案交辦總覽</h3><span class="bg-emerald-600 text-white px-3 py-1 rounded-full text-sm font-bold shadow-sm">總計：${completedTasks.length} 件</span></div><button onclick="window.exportCompletedToExcel()" class="bg-white border hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-medium shadow-sm"><i class="fa-solid fa-print"></i> 匯出報表</button></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${statsHtml}</div></div><div class="bg-white rounded-xl shadow-sm border overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-left border-collapse whitespace-nowrap"><thead class="bg-gray-50 text-gray-600 text-sm"><tr><th class="px-6 py-4 border-b w-16">序</th><th class="px-6 py-4 border-b w-32">提交日期</th><th class="px-6 py-4 border-b w-32">交辦類型</th><th class="px-6 py-4 border-b">交辦事項</th><th class="px-6 py-4 border-b w-48">指派人員</th><th class="px-6 py-4 border-b text-center">操作</th></tr></thead><tbody id="sortable-completed-list" class="divide-y divide-gray-100">${tableRows}</tbody></table></div></div>`;

        function renderExportTasks(container) {
            const activeTasks = window.otherTasksData.filter(t => t.progress < 100 || t.isOngoing).sort((a,b) => new Date(a.submitDate) - new Date(b.submitDate));
            let tableRows = activeTasks.map((t, i) => `<tr class="hover:bg-blue-50/50 group"><td class="px-4 py-2 border text-center text-gray-600 bg-gray-50">${i + 1}</td><td class="px-4 py-2 border outline-none focus:bg-yellow-50" contenteditable="true">${t.submitDate}</td><td class="px-4 py-2 border outline-none focus:bg-yellow-50" contenteditable="true">${t.type}</td><td class="px-4 py-2 border outline-none focus:bg-yellow-50" contenteditable="true">${t.name}</td><td class="px-2 py-2 border text-center w-10"><button onclick="this.closest('tr').remove()" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100" title="刪除此列"><i class="fa-solid fa-xmark"></i></button></td></tr>`).join('');
            container.innerHTML = `<div class="bg-white rounded-xl shadow-sm border flex flex-col h-full"><div class="p-4 border-b flex justify-between items-center bg-blue-50/50"><div><h3 class="font-bold text-blue-800"><i class="fa-solid fa-file-export mr-1"></i> 匯出交辦列表 (報表編輯模式)</h3><p class="text-xs text-gray-500 mt-1">預覽畫面：可點擊文字修改或刪除資料列，完成後即可全選複製。</p></div><button onclick="window.switchView('tasks')" class="bg-white border hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-medium shadow-sm">返回列表</button></div><div class="p-6 overflow-auto flex-1 bg-gray-100"><div class="bg-white p-8 shadow-sm border max-w-4xl mx-auto"><h2 class="text-xl font-bold text-center mb-6" contenteditable="true">地方創生專案辦公室 - 交辦事項列表</h2><table class="w-full text-left border-collapse border text-sm"><thead class="bg-gray-100"><tr><th class="px-4 py-2 border text-center w-16">序</th><th class="px-4 py-2 border w-32">提交日期</th><th class="px-4 py-2 border w-32">交辦類型</th><th class="px-4 py-2 border">交辦事項</th><th class="w-10 border bg-white"></th></tr></thead><tbody>${tableRows}</tbody></table></div></div></div>`;
        }

        // ==========================================
        // 6. 事件表單核心交互處理 (含 Google Sheets 同步)
        // ==========================================
        window.openCustomModal = function(title, msgHtml, type, bodyHtml, actionsHtml) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerHTML = msgHtml || '';
            document.getElementById('modalBody').innerHTML = bodyHtml || '';
            const icon = document.getElementById('modalIcon'), iconC = document.getElementById('modalIconContainer');
            let bgClass = '', iconClass = '';
            if (type === 'info') { iconClass = 'fa-pen-to-square'; bgClass = 'bg-blue-500 shadow-blue-200'; }
            else if (type === 'success') { iconClass = 'fa-check'; bgClass = 'bg-emerald-500 shadow-emerald-200'; }
            else if (type === 'danger') { iconClass = 'fa-triangle-exclamation'; bgClass = 'bg-red-500 shadow-red-200'; }
            else if (type === 'warning') { iconClass = 'fa-triangle-exclamation'; bgClass = 'bg-amber-500 shadow-amber-200'; }
            if (icon && iconC) { icon.className = `fa-solid ${iconClass} text-xl text-white`; iconC.className = `flex items-center justify-center w-12 h-12 mx-auto rounded-full mb-4 shadow-md flex-shrink-0 ${bgClass}`; }
            const actionsContainer = document.getElementById('modalActions');
            if (actionsContainer) { actionsContainer.innerHTML = actionsHtml || `<button onclick="window.closeModal()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">關閉</button>`; }
            const modal = document.getElementById('customModal');
            if (modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
        }

        window.closeModal = function() {
            const modal = document.getElementById('customModal');
            if (modal) { modal.classList.remove('flex'); modal.classList.add('hidden'); }
        }

        window.toggleKpiOngoing = function(taskIndex, kpiIndex, isOngoing) {
            window.sixMajorTasksData[taskIndex].kpi[kpiIndex].isOngoing = isOngoing;
            window.syncDataToGoogleSheets();
            renderDashboard(document.getElementById('content-container'));
        }

        window.updateKpi = function(taskIndex, kpiIndex, inputElement) {
            let val = parseInt(inputElement.value, 10) || 0;
            if (val < 0) { val = 0; inputElement.value = 0; }
            let task = window.sixMajorTasksData[taskIndex];
            task.kpi[kpiIndex].current = val;
            
            let percent = task.kpi[kpiIndex].target > 0 ? Math.round((val / task.kpi[kpiIndex].target) * 100) : 0;
            let percentSpan = document.getElementById(`kpi-percent-${taskIndex}-${kpiIndex}`);
            let barDiv = document.getElementById(`kpi-bar-${taskIndex}-${kpiIndex}`);
            
            if (task.kpi[kpiIndex].isOngoing) {
                if (percentSpan) { percentSpan.innerText = `達成率: 持續進行`; percentSpan.className = `ml-auto font-bold text-orange-600`; }
            } else {
                if (percentSpan) { percentSpan.innerText = `達成率: ${percent}%`; percentSpan.className = `ml-auto font-bold ${percent >= 100 ? 'text-emerald-600' : 'text-orange-600'}`; }
                if (barDiv) barDiv.style.width = `${Math.min(percent, 100)}%`;
            }

            let newMajorProgress = window.calculateMajorTaskProgress(task);
            let majorProgSpan = document.getElementById(`major-progress-${taskIndex}`);
            if (majorProgSpan) {
                majorProgSpan.innerText = newMajorProgress === '持續進行' ? `總體進度: 持續進行` : `總體進度: ${newMajorProgress}%`;
                majorProgSpan.className = `font-medium ${newMajorProgress === '持續進行' ? 'text-blue-600' : 'text-emerald-600'}`;
            }

            task.status = newMajorProgress === '持續進行' ? '進行中' : (newMajorProgress >= 100 ? '已結案' : (newMajorProgress > 0 ? '進行中' : '規劃中'));
            let statusSpan = document.getElementById(`major-status-${taskIndex}`);
            if (statusSpan) statusSpan.outerHTML = `<span id="major-status-${taskIndex}">${window.getStatusBadge(task.status)}</span>`;
            
            window.syncDataToGoogleSheets();
        }

        window.openGanttEditModal = function(majorIndex, subIndex) {
            window.currentEditingGantt = { majorIndex, subIndex };
            var sub = window.sixMajorTasksData[majorIndex].subTasks[subIndex];
            var bodyHtml = `<div class="mb-4"><p class="text-sm font-bold text-gray-700 bg-gray-100 p-2 rounded truncate" title="${sub.text}">${sub.text}</p></div><h5 class="text-xs font-bold text-emerald-700 mb-2 border-b pb-1"><i class="fa-solid fa-clock"></i> 執行排程設定</h5><div id="gantt-periods-container" class="space-y-2 max-h-[20vh] overflow-y-auto p-1 pr-2 mb-2">`;
            sub.periods.forEach(function(p) { bodyHtml += window.generateGanttPeriodRow(p.start, p.end); });
            bodyHtml += `</div><button onclick="window.addGanttPeriod()" class="w-full py-1.5 border border-dashed border-emerald-300 bg-emerald-50 rounded text-emerald-600 text-xs hover:bg-emerald-100 transition-colors mb-5"><i class="fa-solid fa-plus mr-1"></i>新增不連續排程區間</button>`;

            var primary = (sub.members && sub.members.length > 0) ? sub.members[0] : '';
            var coMembers = sub.members ? sub.members.slice(1) : [];
            var primaryOptions = window.teamMembersData.map(function(m) { return `<option value="${m.name}" ${m.name === primary ? 'selected' : ''}>${m.name}</option>`; }).join('');
            var coCheckboxes = window.teamMembersData.map(function(m) { return `<label class="flex items-center gap-2 cursor-pointer p-1.5 hover:bg-white rounded border border-transparent hover:border-gray-200 transition-colors bg-gray-50/50"><input type="checkbox" value="${m.name}" class="w-3.5 h-3.5 text-primary focus:ring-primary border-gray-300 rounded gantt-co-member" ${coMembers.includes(m.name) ? 'checked' : ''}><span class="text-[11px] font-medium text-gray-700">${m.name.slice(-2)}</span></label>`; }).join('');
            
            var otherPersonVal = '', vendorVal = '';
            coMembers.forEach(function(m) { if (m.startsWith('其他人員：')) otherPersonVal = m.replace('其他人員：', ''); if (m.startsWith('委外廠商：')) vendorVal = m.replace('委外廠商：', ''); });

            bodyHtml += `<div class="border-t border-gray-200 pt-4"><h5 class="text-xs font-bold text-blue-700 mb-3 border-b pb-1"><i class="fa-solid fa-users"></i> 指派同仁</h5><label class="block text-xs font-bold text-gray-700 mb-1">主要負責同仁 <span class="text-red-500">*</span></label><select id="gantt_primary" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm bg-white custom-select mb-3">${primaryOptions}</select><label class="block text-xs font-bold text-gray-700 mb-1">協辦同仁 (可複選)</label><div class="grid grid-cols-3 sm:grid-cols-4 gap-1.5">${coCheckboxes}<div class="col-span-3 sm:col-span-4 mt-2 grid grid-cols-1 sm:grid-cols-2 gap-3"><div class="bg-gray-50/50 p-2 rounded border border-gray-200 flex flex-col justify-center"><label class="flex items-center gap-2 cursor-pointer mb-1"><input type="checkbox" id="gantt_check_other" ${otherPersonVal ? 'checked' : ''} onchange="document.getElementById('gantt_input_other').classList.toggle('hidden', !this.checked)"><span class="text-[11px] font-medium">其他人員</span></label><input type="text" id="gantt_input_other" class="w-full border border-gray-300 rounded px-2 py-1 text-xs ${otherPersonVal ? '' : 'hidden'}" placeholder="姓名" value="${otherPersonVal}"></div><div class="bg-gray-50/50 p-2 rounded border border-gray-200 flex flex-col justify-center"><label class="flex items-center gap-2 cursor-pointer mb-1"><input type="checkbox" id="gantt_check_vendor" ${vendorVal ? 'checked' : ''} onchange="document.getElementById('gantt_input_vendor').classList.toggle('hidden', !this.checked)"><span class="text-[11px] font-medium">委外廠商</span></label><input type="text" id="gantt_input_vendor" class="w-full border border-gray-300 rounded px-2 py-1 text-xs ${vendorVal ? '' : 'hidden'}" placeholder="廠商名稱" value="${vendorVal}"></div></div></div></div>`;
            window.openCustomModal('編輯細部工作項目', '', 'info', bodyHtml, `<button onclick="window.closeModal()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">取消</button><button onclick="window.saveGanttPeriods()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700">儲存設定</button>`);
        }

        window.generateGanttPeriodRow = function(start, end) {
            return `<div class="flex items-center gap-2 bg-white p-2 rounded border border-gray-200 shadow-sm gantt-period-row"><div class="flex-1"><input type="date" class="gantt-start border rounded px-2 py-1 text-xs w-full" value="${start}"></div><span class="text-gray-300">-</span><div class="flex-1"><input type="date" class="gantt-end border rounded px-2 py-1 text-xs w-full" value="${end}"></div><button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 p-1"><i class="fa-solid fa-trash-can"></i></button></div>`;
        }

        window.addGanttPeriod = function() { 
            var c = document.getElementById('gantt-periods-container'); 
            if (c) { c.insertAdjacentHTML('beforeend', window.generateGanttPeriodRow(window.defaultStartDate, window.defaultEndDate)); c.scrollTop = c.scrollHeight; }
        }

        window.saveGanttPeriods = function() {
            var newPeriods = [];
            document.querySelectorAll('.gantt-period-row').forEach(function(row) {
                var s = row.querySelector('.gantt-start').value, e = row.querySelector('.gantt-end').value;
                if (s && e && s <= e) newPeriods.push({ start: s, end: e });
            });
            if (newPeriods.length === 0) return window.openCustomModal('格式錯誤', '請至少保留一個有效的執行區間。', 'warning', '', `<button onclick="window.closeModal()" class="px-4 py-2 bg-amber-500 text-white rounded-lg">了解</button>`);

            var primary = document.getElementById('gantt_primary').value;
            var membersArray = [primary];
            document.querySelectorAll('.gantt-co-member:checked').forEach(function(cb) { if (cb.value !== primary) membersArray.push(cb.value); });
            if (document.getElementById('gantt_check_other').checked && document.getElementById('gantt_input_other').value.trim()) membersArray.push('其他人員：' + document.getElementById('gantt_input_other').value.trim());
            if (document.getElementById('gantt_check_vendor').checked && document.getElementById('gantt_input_vendor').value.trim()) membersArray.push('委外廠商：' + document.getElementById('gantt_input_vendor').value.trim());

            window.sixMajorTasksData[window.currentEditingGantt.majorIndex].subTasks[window.currentEditingGantt.subIndex].periods = newPeriods;
            window.sixMajorTasksData[window.currentEditingGantt.majorIndex].subTasks[window.currentEditingGantt.subIndex].members = membersArray;

            window.syncDataToGoogleSheets();
            window.closeModal(); 
            window.views['gantt'].render(document.getElementById('content-container'));
        }

        window.generateTaskFormHtml = function(mode, taskData = null) {
            const isEdit = mode === 'edit';
            const t = taskData || { type: '', name: '', startDate: window.defaultStartDate, endDate: window.defaultEndDate, members: [], isOngoing: false };
            const typeOptions = window.taskTypes.map(type => `<option value="${type}" ${t.type === type ? 'selected' : ''}>${type}</option>`).join('');
            let primary = t.members.length > 0 ? t.members[0] : '';
            const primaryOptions = window.teamMembersData.map(m => `<option value="${m.name}" ${m.name === primary ? 'selected' : ''}>${m.name}</option>`).join('');
            
            let otherPersonVal = '', vendorVal = '';
            t.members.slice(1).forEach(m => { 
                if (m.startsWith('其他人員：')) otherPersonVal = m.replace('其他人員：', ''); 
                if (m.startsWith('委外廠商：')) vendorVal = m.replace('委外廠商：', ''); 
            });

            return `<div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border p-6 md:p-8"><h3 class="text-lg font-bold text-gray-800 mb-6 border-b pb-4 flex items-center gap-2"><i class="fa-solid fa-clipboard-list text-primary"></i> ${isEdit ? '編輯' : '新增'}交辦事項</h3>
                <form id="taskForm" onsubmit="window.handleTaskFormSubmit(event, '${isEdit ? t.id : ''}')">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div><label class="block text-sm font-medium text-gray-700 mb-2">交辦類型 <span class="text-red-500">*</span></label><select id="t_type" required class="w-full border rounded-lg px-4 py-2 custom-select">${typeOptions}</select></div>
                        <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700 mb-2">交辦事項 <span class="text-red-500">*</span></label><input type="text" id="t_name" value="${t.name}" required class="w-full border rounded-lg px-4 py-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-2">排程 (起始日期) <span class="text-red-500">*</span></label><input type="date" id="t_start" required value="${t.startDate}" class="w-full border rounded-lg px-4 py-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-2">排程 (預計完成) <span class="text-red-500">*</span></label><input type="date" id="t_end" required value="${t.endDate}" class="w-full border rounded-lg px-4 py-2"></div>
                        <div class="md:col-span-2"><label class="flex items-center gap-2 cursor-pointer p-3 bg-blue-50 border border-blue-200 rounded-lg w-fit shadow-sm"><input type="checkbox" id="t_is_ongoing" class="w-4 h-4 text-blue-600 rounded" ${t.isOngoing ? 'checked' : ''}><span class="text-sm font-bold text-blue-700">此為「持續進行」項目</span></label></div>
                        <div class="col-span-1 md:col-span-2 bg-gray-50 p-5 rounded-lg border"><div class="mb-4 pb-4 border-b"><label class="block text-sm font-medium mb-2">主要負責同仁 <span class="text-red-500">*</span></label><select id="t_primary" required class="w-full md:w-1/2 border rounded-lg px-4 py-2 bg-white custom-select">${primaryOptions}</select></div>
                            <label class="block text-sm font-medium mb-3">協辦同仁 (可複選)</label><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mt-2">${window.teamMembersData.map(m => `<label class="flex items-center gap-2 cursor-pointer p-2 bg-white/50 border rounded shadow-sm"><input type="checkbox" value="${m.name}" class="w-4 h-4 text-primary rounded member-checkbox" ${t.members.slice(1).includes(m.name) ? 'checked' : ''}><span class="text-sm font-medium">${m.name.slice(-2)}</span></label>`).join('')}<div class="col-span-2 sm:col-span-4 mt-2 grid grid-cols-1 sm:grid-cols-2 gap-3"><div class="bg-white/50 p-3 rounded border flex flex-col justify-center"><label class="flex items-center gap-2 mb-1"><input type="checkbox" id="t_check_other" ${otherPersonVal ? 'checked' : ''} onchange="document.getElementById('t_input_other').classList.toggle('hidden', !this.checked)"><span class="text-sm font-medium">其他人員</span></label><input type="text" id="t_input_other" class="w-full border rounded px-3 py-1.5 text-sm ${otherPersonVal ? '' : 'hidden'}" value="${otherPersonVal}"></div><div class="bg-white/50 p-3 rounded border flex flex-col justify-center"><label class="flex items-center gap-2 mb-1"><input type="checkbox" id="t_check_vendor" ${vendorVal ? 'checked' : ''} onchange="document.getElementById('t_input_vendor').classList.toggle('hidden', !this.checked)"><span class="text-sm font-medium">委外廠商</span></label><input type="text" id="t_input_vendor" class="w-full border rounded px-3 py-1.5 text-sm ${vendorVal ? '' : 'hidden'}" value="${vendorVal}"></div></div></div></div></div>
                    <div class="flex justify-end gap-4 mt-8 pt-6 border-t">${isEdit ? `<button type="button" onclick="window.closeModal()" class="px-6 py-2.5 border rounded-lg hover:bg-gray-50">取消</button>` : `<button type="button" onclick="window.switchView('tasks')" class="px-6 py-2.5 border rounded-lg hover:bg-gray-50">返回列表</button>`}<button type="submit" class="px-6 py-2.5 bg-primary text-white rounded-lg hover:bg-dark flex items-center gap-2"><i class="fa-solid fa-save"></i> 儲存交辦</button></div>
                </form></div>`;
        }

        window.handleTaskFormSubmit = function(event, editId) {
            event.preventDefault(); 
            const primary = document.getElementById('t_primary').value;
            let selectedMembers = [primary];
            document.querySelectorAll('.member-checkbox:checked').forEach(cb => { if (cb.value !== primary) selectedMembers.push(cb.value); });
            if (document.getElementById('t_check_other').checked && document.getElementById('t_input_other').value.trim()) selectedMembers.push('其他人員：' + document.getElementById('t_input_other').value.trim());
            if (document.getElementById('t_check_vendor').checked && document.getElementById('t_input_vendor').value.trim()) selectedMembers.push('委外廠商：' + document.getElementById('t_input_vendor').value.trim());

            const isOngoing = document.getElementById('t_is_ongoing').checked;
            const taskObj = { type: document.getElementById('t_type').value, name: document.getElementById('t_name').value, startDate: document.getElementById('t_start').value, endDate: document.getElementById('t_end').value, members: selectedMembers, isOngoing: isOngoing };

            if (editId) {
                const idx = window.otherTasksData.findIndex(t => t.id === editId);
                window.otherTasksData[idx] = { ...window.otherTasksData[idx], ...taskObj };
                if (isOngoing) window.otherTasksData[idx].status = '進行中';
            } else {
                taskObj.id = 'T-' + String(window.otherTasksData.length + 1).padStart(3, '0');
                taskObj.submitDate = window.getToday(); taskObj.progress = 0; taskObj.status = isOngoing ? '進行中' : '規劃中';
                window.otherTasksData.unshift(taskObj);
            }
            window.syncDataToGoogleSheets();
            window.closeModal(); 
            if(!editId) window.openCustomModal('建立成功', `已新增交辦！`, 'success', '', `<button onclick="window.closeModal(); window.switchView('tasks');" class="px-6 py-2 bg-primary text-white rounded-lg">前往列表</button>`);
            else window.views[window.currentView].render(document.getElementById('content-container'));
        }

        window.openEditOtherTaskModal = function(taskId) { 
            window.openCustomModal('編輯交辦事項', '', 'info', window.generateTaskFormHtml('edit', window.otherTasksData.find(t => t.id === taskId)), ''); 
        }

        window.confirmDeleteOther = function(taskId) { 
            window.openCustomModal('確認刪除', `確定要刪除：<br><strong>${window.otherTasksData.find(t=>t.id===taskId).name}</strong>？`, 'danger', '', `<button onclick="window.closeModal()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">取消</button><button onclick="window.executeDeleteOther('${taskId}')" class="px-4 py-2 bg-red-600 text-white rounded-lg">刪除</button>`); 
        }
        
        window.executeDeleteOther = function(taskId) { 
            window.otherTasksData.splice(window.otherTasksData.findIndex(t => t.id === taskId), 1); 
            window.syncDataToGoogleSheets();
            window.closeModal(); 
            window.views[window.currentView].render(document.getElementById('content-container'));
        }

        window.openProgressModal = function(taskId) {
            const data = window.otherTasksData.find(t => t.id === taskId);
            window.openCustomModal('更新進度', `更新：<strong>${data.name}</strong>`, 'info', `<div class="mt-2"><label class="flex items-center justify-center gap-2 cursor-pointer mb-5 p-2.5 bg-blue-50 hover:bg-blue-100 rounded border border-blue-200"><input type="checkbox" id="mod_is_ongoing" class="w-4 h-4 text-blue-600 rounded" ${data.isOngoing ? 'checked' : ''} onchange="document.getElementById('mod_progress_container').classList.toggle('opacity-40', this.checked); document.getElementById('mod_progress').disabled = this.checked;"><span class="text-sm font-bold text-blue-700">設為「持續進行」項目</span></label><div id="mod_progress_container" class="${data.isOngoing ? 'opacity-40' : ''}"><label class="block text-xs font-bold text-gray-700 mb-2 text-center">當前進度 (0-100%)</label><input type="number" id="mod_progress" min="0" max="100" value="${data.progress}" class="w-full border rounded-lg px-3 py-3 text-center text-2xl font-bold text-emerald-700" ${data.isOngoing ? 'disabled' : ''}></div></div>`, `<button onclick="window.closeModal()" class="px-4 py-2 bg-white border rounded-lg">取消</button><button onclick="window.executeProgressUpdate('${taskId}')" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">儲存</button>`);
        }

        window.executeProgressUpdate = function(taskId) {
            const idx = window.otherTasksData.findIndex(t => t.id === taskId), isOngoing = document.getElementById('mod_is_ongoing').checked;
            window.otherTasksData[idx].isOngoing = isOngoing;
            if (isOngoing) { window.otherTasksData[idx].status = '進行中'; } 
            else {
                let val = parseInt(document.getElementById('mod_progress').value, 10);
                if (isNaN(val) || val < 0 || val > 100) return window.openCustomModal('錯誤', '請輸入0-100的數字', 'warning', '', `<button onclick="window.closeModal()" class="px-4 py-2 bg-amber-500 text-white rounded">了解</button>`);
                window.otherTasksData[idx].progress = val; window.otherTasksData[idx].status = val === 100 ? '已結案' : (val > 0 ? '進行中' : '規劃中');
            }
            window.syncDataToGoogleSheets();
            window.closeModal(); 
            window.views[window.currentView].render(document.getElementById('content-container'));
        }

        window.openEditMemberModal = function(idx) {
            window.editingMemberIndex = idx;
            let member = window.teamMembersData[idx];
            let bodyHtml = `<div class="mt-4"><label class="block text-sm font-bold text-gray-700 mb-2">更新姓名 <span class="text-red-500">*</span></label><input type="text" id="edit_member_name" value="${member.name}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-emerald-500 focus:outline-none"></div>`;
            window.openCustomModal('編輯同仁資訊', '修改同仁的姓名，這將會自動連動所有工項指派系統。', 'info', bodyHtml, `<button onclick="window.closeModal()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">取消</button><button onclick="window.executeEditMember()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">儲存變更</button>`);
        }

        window.executeEditMember = function() {
            let newName = document.getElementById('edit_member_name').value.trim();
            if (!newName) return;
            let oldName = window.teamMembersData[window.editingMemberIndex].name;
            window.teamMembersData[window.editingMemberIndex].name = newName;
            window.sixMajorTasksData.forEach(task => task.subTasks.forEach(sub => { if (sub.members) sub.members = sub.members.map(m => m === oldName ? newName : m); }));
            window.otherTasksData.forEach(task => { if (task.members) task.members = task.members.map(m => m === oldName ? newName : m); });
            window.syncDataToGoogleSheets();
            window.closeModal(); renderMemberTasks(document.getElementById('content-container'));
        }

        window.confirmRemoveMember = function(idx) {
            window.removingMemberIndex = idx;
            let member = window.teamMembersData[idx];
            window.openCustomModal('確認移除同仁', `確定要把 <strong>${member.name}</strong> 移除嗎？<br><span class="text-red-500 text-xs mt-2 block">這會將該同仁從所有負責工項中抽離。</span>`, 'danger', '', `<button onclick="window.closeModal()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">取消</button><button onclick="window.executeRemoveMember()" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700">確定移除</button>`);
        }

        window.executeRemoveMember = function() {
            let oldName = window.teamMembersData[window.removingMemberIndex].name;
            window.teamMembersData.splice(window.removingMemberIndex, 1);
            window.sixMajorTasksData.forEach(task => task.subTasks.forEach(sub => { if (sub.members) sub.members = sub.members.filter(m => m !== oldName); }));
            window.otherTasksData.forEach(task => { if (task.members) task.members = task.members.filter(m => m !== oldName); });
            window.syncDataToGoogleSheets();
            window.closeModal(); renderMemberTasks(document.getElementById('content-container'));
        }

        window.handleCardDragStart = function(event, type, index1, index2, originalOwner) {
            window.draggedTaskInfo = { type, index1, index2, originalOwner };
            event.dataTransfer.setData('text/plain', 'dragged-task');
        }

        window.handleCardDragOver = function(event) {
            event.preventDefault();
            const card = event.currentTarget;
            card.classList.add('drag-target-hover');
        }

        window.handleCardDragLeave = function(event) {
            const card = event.currentTarget;
            card.classList.remove('drag-target-hover');
        }

        window.handleCardDrop = function(event, targetMemberName) {
            event.preventDefault();
            const card = event.currentTarget;
            card.classList.remove('drag-target-hover');

            if (!window.draggedTaskInfo) return;
            const { type, index1, index2, originalOwner } = window.draggedTaskInfo;
            if (originalOwner === targetMemberName) return;

            if (type === 'major') {
                let sub = window.sixMajorTasksData[index1].subTasks[index2];
                let members = sub.members ? [...sub.members] : [];
                members = members.filter(m => m !== targetMemberName);
                members.unshift(targetMemberName);
                sub.members = members;
            } else if (type === 'other') {
                let task = window.otherTasksData[index1];
                let members = task.members ? [...task.members] : [];
                members = members.filter(m => m !== targetMemberName);
                members.unshift(targetMemberName);
                task.members = members;
            }
            window.draggedTaskInfo = null;
            window.syncDataToGoogleSheets();
            renderMemberTasks(document.getElementById('content-container'));
        }

        window.openAddMemberModal = function() {
            let bodyHtml = `<div class="mt-4"><label class="block text-sm font-bold text-gray-700 mb-2">同仁姓名 <span class="text-red-500">*</span></label><input type="text" id="new_member_name" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-emerald-500 focus:outline-none" placeholder="例如：林小明"></div>`;
            let actionsHtml = `<button onclick="window.closeModal()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">取消</button><button onclick="window.executeAddMember()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700">新增同仁</button>`;
            window.openCustomModal('新增專案辦公室同仁', '請輸入新進人員姓名。系統會自動指派色彩與後兩字之簡稱圖貼。', 'info', bodyHtml, actionsHtml);
            setTimeout(() => document.getElementById('new_member_name').focus(), 150);
        }

        window.executeAddMember = function() {
            let name = document.getElementById('new_member_name').value.trim();
            if (!name) return;
            if (window.teamMembersData.some(m => m.name === name)) {
                return window.openCustomModal('同仁已存在', '系統中已有相同姓名的同仁，請加上區別字。', 'warning', '', `<button onclick="window.closeModal()" class="px-4 py-2 bg-amber-500 text-white rounded-lg">了解</button>`);
            }
            let randomColor = window.colorPalette[Math.floor(Math.random() * window.colorPalette.length)];
            window.teamMembersData.push({ name: name, color: randomColor });
            window.syncDataToGoogleSheets();
            window.closeModal();
            renderMemberTasks(document.getElementById('content-container'));
        }

        // ==========================================
        // 7. 拖曳排序初始化 (防無限迴圈安全版)
        // ==========================================
        window.sortableRetryCount = 0;
        window.initSortable = function() {
            const el = document.getElementById('sortable-task-list');
            if (el && typeof Sortable !== 'undefined') {
                new Sortable(el, {
                    animation: 150, ghostClass: 'bg-emerald-50', handle: '.cursor-move',
                    onEnd: function () {
                        const activeFilter = t => (t.progress < 100 && !t.isOngoing);
                        window.reorderTasksByDOM(el, activeFilter);
                    }
                });
            } else if (el && window.sortableRetryCount < 10) { 
                window.sortableRetryCount++;
                setTimeout(window.initSortable, 500); 
            }
        }

        window.sortableCompletedRetryCount = 0;
        window.initSortableCompleted = function() {
            const el = document.getElementById('sortable-completed-list');
            if (el && typeof Sortable !== 'undefined') {
                new Sortable(el, {
                    animation: 150, ghostClass: 'bg-emerald-50', handle: '.cursor-move',
                    onEnd: function () {
                        const completedFilter = t => (t.progress === 100 && !t.isOngoing);
                        window.reorderTasksByDOM(el, completedFilter);
                    }
                });
            } else if (el && window.sortableCompletedRetryCount < 10) { 
                window.sortableCompletedRetryCount++;
                setTimeout(window.initSortableCompleted, 500); 
            }
        }

        window.exportCompletedToExcel = function() {
            const completedTasks = window.otherTasksData.filter(t => t.progress === 100 && !t.isOngoing);
            if (completedTasks.length === 0) return window.openCustomModal('提示', '目前尚無已結案事項可供匯出。', 'info', '', `<button onclick="window.closeModal()" class="px-4 py-2 bg-blue-500 text-white rounded">了解</button>`);
            let tableHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"></head><body><table border="1"><tr style="background-color:#059669;color:white;"><th>序</th><th>提交日期</th><th>交辦類型</th><th>交辦事項</th></tr>`;
            completedTasks.forEach((t, i) => { tableHtml += `<tr><td>${i + 1}</td><td>${t.submitDate}</td><td>${t.type}</td><td>${t.name}</td></tr>`; });
            tableHtml += `</table></body></html>`;
            const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `已結案交辦清單_${window.getToday()}.xls`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        // ==========================================
        // 8. 視圖路由器配置與全域切換
        // ==========================================
        window.views = {
            'dashboard': { title: '六大工項儀表板', render: renderDashboard },
            'gantt': { title: '細部工作項目甘特圖', render: renderGantt },
            'member-tasks': { title: '同仁負責工項', render: renderMemberTasks },
            'tasks': { title: '交辦事項列表', render: renderOtherTasks },
            'add-task': { title: '新增交辦', render: renderAddOtherTask },
            'completed-tasks': { title: '已結案交辦', render: renderCompletedTasks },
            'export-tasks': { title: '匯出報表編輯', render: renderExportTasks }
        };

        window.switchView = function(viewName) {
            try {
                window.currentView = viewName;
                document.getElementById('page-title').innerText = window.views[viewName].title;
                document.querySelectorAll('.nav-item').forEach(el => { el.classList.replace('bg-primary', 'text-gray-300'); el.classList.replace('text-white', 'text-gray-300'); });
                const activeNav = document.getElementById(`nav-${viewName}`);
                if (activeNav) { activeNav.classList.replace('text-gray-300', 'bg-primary'); activeNav.classList.add('text-white'); }
                const container = document.getElementById('content-container');
                container.innerHTML = ''; container.classList.remove('fade-in'); void container.offsetWidth; container.classList.add('fade-in');
                window.views[viewName].render(container);
                if (window.innerWidth < 1024 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) window.toggleMobileMenu();
            } catch (err) {
                const el = document.getElementById('error-log');
                if(el){ el.classList.remove('hidden'); el.innerHTML += "切換視圖失敗: " + err.message + "<br>"; }
            }
        }

        window.toggleMobileMenu = function() { 
            document.getElementById('sidebar').classList.toggle('-translate-x-full'); 
            document.getElementById('mobile-overlay').classList.toggle('hidden'); 
        };

        window.initApp = function() {
            try {
                window.switchView('dashboard');
            } catch (e) { console.error(e); }
        }

        // ==========================================
        // 9. 系統啟動
        // ==========================================
        if (document.readyState === 'loading') { 
            window.addEventListener('DOMContentLoaded', initGoogleSheetsDB); 
        } else { 
            initGoogleSheetsDB(); 
        }
    </script>
</body>
</html>
